# Open single-tree path with the service chance constraint, on SCIP (Apache-2.0).
seed: 20231015
data:
  source: geonames
  country: DE
  n_facilities: 12
scenarios:
  n_scenarios: 8
  n_sample: 400
  sigma: 0.2
  reduction: kmeans
model:
  chance_constraint: true
  epsilon: 0.10
  gamma: 0.05
solver:
  backend: branch_and_cut
  mip_solver: scip
  lp_solver: highs
  pareto_cuts: false
  time_limit: 600
